name: Sync AI News

on:
  schedule:
    # 每天 18:30（北京时间 UTC+8）= 10:30 UTC
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-ai-news
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest AI news
        run: npm run fetch-news

      - name: Run tests
        run: npm test

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet content/news/news.json; then
            echo "No news changes to commit."
            exit 0
          fi
          git add content/news/news.json
          git commit -m "chore: sync AI news feed [automated]"
          git push
